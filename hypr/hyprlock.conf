label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%A, %B %d")"
  color = rgba(242, 243, 244, 0.75)
  font_size = 20
  font_family = CaskaydiaMono Nerd Font
  position = 0, 405
  halign = center
  valign = center
}

label {
  monitor = 
  text = cmd[update:1000] echo "$(date +"%k:%M")"
  color = rgba(242, 243, 244, 0.75)
  font_size = 93
  font_family = CaskaydiaMono Nerd Font
  position = 0, 310
  halign = center
  valign = center
}


label {
    monitor =
    text = $USER
    color = rgba(242, 243, 244, 0.75)
    font_size = 12
    font_family = CaskaydiaMono Nerd Font
    position = 0, -407
    halign = center
    valign = center
}

label {
    monitor =
    text = Touch ID or Enter Password
    color = rgba(242, 243, 244, 0.75)
    font_size = 10
    font_family = CaskaydiaMono Nerd Font
    position = 0, -438
    halign = center
    valign = center
}

image {
    monitor =
    path = ~/Pictures/fullpp.png 
    border_color = 0xffdddddd
    border_size = 0
    size = 73
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, -353
    halign = center
    valign = center
}

auth {
    fingerprint:enabled = false
    pam:enabled = true
    pam:module = hyprlock
}
