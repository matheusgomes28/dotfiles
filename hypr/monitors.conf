# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale
# You must relaunch Hyprland after changing any envs (use Super+Esc, then Relaunch)

# Backgrounds
exec-once = swww-daemon & sleep 0.1 && swww img /usr/share/backgrounds/Monument_valley_by_orbitelambda.jpg

# Optimized for retina-class 2x displays, like 13" 2.8K, 27" 5K, 32" 6K.
env = GDK_SCALE,1
monitor=,preferred,auto,auto

# Main laptop monitor
monitor=eDP-1,preferred,0x0,1
monitor=DP-1,preferred,auto,1

# Home monitor
monitor=desc:Dell Inc. DELL P2423D 4TZ4TY3,preferred,auto,1

workspace = 1, monitor:eDP-1
workspace = 2, monitor:eDP-1

# Home setup
# workspace = 3, monitor:HDMI-A-1
# workspace = 4, monitor:HDMI-A-1
# workspace = 5, monitor:HDMI-A-1
# workspace = 6, monitor:HDMI-A-1

# Work setup
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1
workspace = 6, monitor:DP-1

# Good compromise for 27" or 32" 4K monitors (but fractional!)
# env = GDK_SCALE,1.75
# monitor=,preferred,auto,1.666667

# Straight 1x setup for low-resolution displays like 1080p or 1440p
# env = GDK_SCALE,1
# monitor=,preferred,auto,1

# Example for Framework 13 w/ 6K XDR Apple display
# monitor = DP-5, 6016x3384@60, auto, 2
# monitor = eDP-1, 2880x1920@120, auto, 2


# Three Monotor Setup!

# Dell monitor
monitor=DP-7,preferred,1600x0,1
monitor=DP-5,preferred,3580x0,1

workspace = 1, monitor:eDP-1
workspace = 2, monitor:DP-7
workspace = 3, monitor:DP-7
workspace = 4, monitor:DP-7
workspace = 5, monitor:DP-7

